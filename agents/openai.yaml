interface:
  display_name: "ChatGPT-Codex 協作驗收"
  short_description: "讓 ChatGPT 實作、Codex 依 spec 驗收並持續追蹤原生 /goal"
  default_prompt: "依照協作流程，先檢查目前 Codex thread 的原生 /goal；若不存在就依使用者要求建立，若存在就綁定並沿著完整 objective 推進。每次只把一個有限任務交給 ChatGPT 實作，Codex 以 GitHub commit 驗收；task 通過後回到原生 goal audit，未完成就保持 active 並繼續。"
