schema_version: "2.1"

target:
  operating_system: "macOS"
  minimum_version: "13.0"

executor:
  type: "macos_local_workspace"
  workspace_root: "~/Developer/codex-workspaces"
  python_command: "python3"
  shell_command: "/bin/sh"

repository:
  remote: "origin"
  default_base_branch: "main"
  branch_prefix: "chatgpt/"
  allow_existing_checkout: true
  require_clean_worktree: true
  prefer_git_worktree: true

capabilities:
  read_files: true
  write_files: true
  run_commands: true
  git_commit: true
  git_push: true
  browser_preview: false
  external_network: true

restrictions:
  allow_force_push: false
  allow_base_branch_write: false
  allow_secret_read: false
  allow_unapproved_files: false
  allow_package_install: false

transport:
  surface_preference:
    - "Google Chrome"
    - "ChatGPT"
    - "Safari"
  require_existing_conversation: true
  require_chat_mode: true

watcher:
  supervisor: "launchd"
  launch_agent_directory: "~/Library/LaunchAgents"
  lease_seconds: 7200
  initial_poll_seconds: 60
  max_poll_seconds: 300
  backoff_after_unchanged_polls: 5
  local_await_poll_seconds: 2
  local_await_timeout_seconds: 7500
  keep_codex_turn_active_while_waiting: true
  absolute_deadline_seconds: 21600

paths:
  task_state_root: "~/.codex/collaboration/tasks"
  log_root: "~/.codex/collaboration/logs"
