schema_version: "4.0"

target:
  operating_system: "macOS"
  minimum_version: "13.0"

verifier:
  type: "macos_local_workspace"
  workspace_root: "~/Developer/codex-workspaces"
  python_command: "python3"
  shell_command: "/bin/sh"
  require_local_checkout: true
  require_command_execution: true
  require_codex_thread_id: true

repository:
  remote: "origin"
  default_base_branch: "main"
  branch_prefix: "chatgpt/"
  allow_existing_checkout: true
  require_clean_worktree: true
  prefer_git_worktree: true
  require_remote_handoff_branch_before_dispatch: true
  require_remote_branch_head_equals_base_sha: true

implementer:
  capability_handshake_required: true
  accepted_profiles:
    - "local_full"
    - "github_connector"
  rejected_profiles:
    - "read_only"
    - "none"
  local_full:
    implementation_validation_policy: "implementer_required"
    candidate_commit_without_tests: false
  github_connector:
    implementation_validation_policy: "deferred_to_codex"
    candidate_commit_without_tests: true
    require_precreated_remote_branch: true
  handoff_receipt:
    schema: "contracts/handoff-receipt.schema.json"
    completed_requires_commit_sha: true
    completed_requires_changed_files: true
    blocked_requires_nonempty_blockers: true

restrictions:
  allow_force_push: false
  allow_base_branch_write: false
  allow_secret_read: false
  allow_unapproved_files: false
  allow_package_install: false

transport:
  surface_preference:
    - "Google Chrome"
    - "ChatGPT"
    - "Safari"
  require_existing_conversation: true
  require_chat_mode: true
  terminal_event_channel: "~/.codex/collaboration/events"
  required_terminal_events:
    - "implementation_blocked"
    - "conversation_completed_no_commit"
    - "conversation_failed"
    - "transport_unreachable"
    - "mode_drifted"

watcher:
  supervisor: "launchd"
  launch_agent_directory: "~/Library/LaunchAgents"
  wait_strategy: "event_driven_resume"
  suspend_native_goal_during_wait: true
  resume_command: "codex exec resume"
  thread_id_source: "CODEX_THREAD_ID"
  blocking_await_enabled: false
  lease_seconds: 7200
  initial_poll_seconds: 60
  max_poll_seconds: 300
  backoff_after_unchanged_polls: 5
  stop_on_transport_terminal_event: true
  resume_on_handoff_candidate: true
  resume_on_observation_lease_expiry: true
  fallback_on_resume_failure: "pause_goal_and_notify"
  absolute_deadline_seconds: 21600

paths:
  task_state_root: "~/.codex/collaboration/tasks"
  event_root: "~/.codex/collaboration/events"
  wake_root: "~/.codex/collaboration/wakes"
  log_root: "~/.codex/collaboration/logs"
