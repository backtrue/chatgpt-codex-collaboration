schema_version: "4.1"

target:
  operating_system: "macOS"
  minimum_version: "13.0"
  architectures:
    - "arm64"
    - "x86_64"
  unsupported:
    - "Linux"
    - "Windows"
    - "WSL"

native_goal_policy:
  task_blocker_may_mutate_native_goal: false
  task_failure_may_replace_goal: false
  automatic_goal_clear: false
  minimum_repeated_native_goal_turns_before_blocked: 3
  require_no_executor_fallback_before_blocked: true
  require_complete_goal_blocker_before_blocked: true
  transport_wait_suspension:
    authorized: true
    status_during_wait: "paused"
    preserve_goal_id: true
    preserve_objective: true
    resume_same_goal_on_event: true
    controller: "codex app-server thread/goal/set"
    purpose: "Prevent native goal continuation turns while waiting for an external ChatGPT handoff."
  post_resume_quiescence:
    authorized: true
    status_after_stable_blocker: "paused"
    pause_timing: "turn.completed"
    preserve_goal_id: true
    preserve_objective: true
    unchanged_status_is_noop: true
    suppress_user_visible_duplicate_status: true
    single_concurrent_wake_per_task: true
    condition_fingerprint_fields:
      - "task_id"
      - "dispatch_id"
      - "event_type"
      - "candidate_sha"
      - "event_payload"
    stable_task_states:
      - "BLOCKED_GOAL"
      - "BLOCKED_SPEC"
      - "BLOCKED_CAPABILITY"
      - "BLOCKED_DEPENDENCY"
      - "BLOCKED_TRANSPORT"
      - "BLOCKED_OBSERVATION"
      - "BLOCKED_USER"
      - "FAILED"
      - "CANCELLED"
    orphaned_async_states:
      - "DISPATCHING"
      - "IMPLEMENTING"
      - "WAITING_HANDOFF"
      - "WAITING_REPAIR"
    purpose: "Stop repeated native goal continuation turns after a resumed turn produces no actionable state change."
  recovery_from_legacy_blocked_or_paused:
    preserve_goal_id: true
    preserve_objective: true
    resume_same_goal: true
    rerun_capability_handshake: true

required:
  commands:
    sh:
      path: "/bin/sh"
      purpose: "Run thin POSIX-compatible script entrypoints."
    python3:
      minimum_version: "3.9"
      purpose: "Run orchestration, state, watcher, event, wake, quiescence, and validation logic."
    git:
      minimum_version: "2.30"
      purpose: "Create and verify remote handoff branches and inspect candidate commits."
    codex:
      purpose: "Expose app-server goal control and non-interactive session resume."
      required_subcommands:
        - "app-server"
        - "exec resume"
    xcode-select:
      purpose: "Verify Xcode Command Line Tools are configured."
    launchctl:
      purpose: "Run event supervisors as per-user LaunchAgents."
    osascript:
      purpose: "Provide a macOS notification fallback when automatic Codex resume fails."
    open:
      purpose: "Open the approved ChatGPT conversation surface."
    browser-use:
      purpose: "Control the approved ChatGPT web conversation through local Chrome CDP without using Codex model turns for waiting."

  verifier_capabilities:
    codex_thread_id:
      description: "Shell commands receive CODEX_THREAD_ID for the current persisted session."
      missing_behavior: "BLOCKED_CAPABILITY"
    codex_goal_control:
      description: "Use app-server thread/goal/get and thread/goal/set without invoking a model."
      missing_behavior: "BLOCKED_CAPABILITY"
    codex_session_resume:
      description: "Use codex exec resume to continue the same thread after a watcher event."
      missing_behavior: "notify_only"
    chatgpt_conversation_access:
      description: "Open, inspect, and send messages to the approved ChatGPT web conversation through browser-use CDP."
      missing_behavior: "BLOCKED_TRANSPORT"
    local_repository_checkout:
      description: "Codex can read the complete repository locally."
      missing_behavior: "BLOCKED_CAPABILITY"
    local_command_execution:
      description: "Codex can run required acceptance commands locally."
      missing_behavior: "BLOCKED_CAPABILITY"
    github_read_write:
      description: "Codex can create the remote handoff branch and fetch its candidate commit."
      missing_behavior: "BLOCKED_TRANSPORT"

  implementer_minimum_capabilities:
    repository_read: true
    repository_write: true
    git_commit: true
    git_push: true
    accepted_profiles:
      - "local_full"
      - "github_connector"
    rejected_profiles:
      - "read_only"
      - "none"

  contracts:
    collaboration: "contracts/collaboration.schema.json"
    handoff_receipt: "contracts/handoff-receipt.schema.json"

executor_profiles:
  local_full:
    description: "ChatGPT has a local checkout, shell, test runner, commit, and push access."
    implementation_validation_policy: "implementer_required"
    candidate_commit_without_tests: false
    verifier_behavior: "Re-run focused acceptance and required regression checks independently."

  github_connector:
    description: "ChatGPT can edit and commit through GitHub connector but has no local shell or test runner."
    implementation_validation_policy: "deferred_to_codex"
    candidate_commit_without_tests: true
    require_precreated_remote_branch: true
    verifier_behavior: "Codex must fetch the candidate and run every required acceptance command locally before acceptance."

  read_only:
    description: "ChatGPT can inspect but cannot create a candidate commit."
    missing_behavior: "BLOCKED_CAPABILITY"

  none:
    description: "ChatGPT has no usable repository executor."
    missing_behavior: "BLOCKED_CAPABILITY"

conditional:
  skills:
    spec-discovery-gate:
      required_when: "The repository workflow declares it in repo-local instructions."
      missing_behavior: "BLOCKED_DEPENDENCY"
    spec-task-audit-list:
      required_when: "The repository workflow declares it in repo-local instructions."
      missing_behavior: "BLOCKED_DEPENDENCY"
    spec-acceptance-audit:
      required_when: "The repository workflow declares it in repo-local instructions."
      missing_behavior: "BLOCKED_DEPENDENCY"

optional:
  commands:
    gh:
      purpose: "Inspect GitHub authentication and CI state."
    brew:
      purpose: "Install or update local macOS tooling."

  capabilities:
    github_webhook:
      purpose: "Wake the verifier when the assigned branch changes."
      fallback: "macOS launchd event supervisor"
    browser_preview:
      purpose: "Verify frontend behavior on required viewports."
      fallback: "BLOCKED_CAPABILITY when browser verification is required"
