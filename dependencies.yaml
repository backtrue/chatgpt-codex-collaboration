schema_version: "1.1"

required:
  commands:
    git:
      minimum_version: "2.30"
      purpose: "Inspect repositories, compare commits, and manage handoff branches."
    bash:
      minimum_version: "4.0"
      purpose: "Run deterministic orchestration scripts."
    python3:
      minimum_version: "3.9"
      purpose: "Validate JSON contracts and persist task state."

  capabilities:
    codex_goal_tools:
      description: "Expose get_goal, create_goal, and update_goal for the current Codex thread."
      missing_behavior: "blocked-goal"
    chatgpt_conversation_access:
      description: "Open and interact with the approved existing ChatGPT conversation."
    repository_read:
      description: "Read the repository, agent instructions, and authoritative specifications."
    repository_write:
      description: "Edit files inside an isolated implementation branch."
    github_push:
      description: "Push the assigned implementation branch to the configured remote."

  contracts:
    collaboration: "contracts/collaboration.schema.json"

conditional:
  skills:
    spec-discovery-gate:
      required_when: "The repository workflow declares it in repo-local instructions."
      missing_behavior: "blocked-dependency"
    spec-task-audit-list:
      required_when: "The repository workflow declares it in repo-local instructions."
      missing_behavior: "blocked-dependency"
    spec-acceptance-audit:
      required_when: "The repository workflow declares it in repo-local instructions."
      missing_behavior: "blocked-dependency"

optional:
  commands:
    jq:
      minimum_version: "1.6"
      purpose: "Human-friendly JSON inspection."

  capabilities:
    codex_goal_ui_control:
      purpose: "Allow user/system-authorized /goal resume, pause, edit, or clear operations."
      fallback: "Transition to BLOCKED_GOAL and report the exact required /goal action."
    github_webhook:
      purpose: "Wake the verifier when the assigned branch changes."
      fallback: "scripts/wait-for-handoff.sh"
    browser_automation:
      purpose: "Inspect ChatGPT mode and frontend acceptance surfaces."
      fallback: "blocked-capability when the task requires browser verification"
